<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JGUA - Sistema de Recolha de Dados</title>
    <meta name="description" content="Sistema PWA para recolha e sincronização de dados com Google Sheets">
    <meta name="theme-color" content="#2563eb">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Container Principal -->
    <div id="app" class="app-container">
        <!-- Tela de Login -->
        <section id="login-screen" class="screen active">
            <div class="login-container">
                <div class="login-card">
                    <div class="logo">
                        <i class="fas fa-database"></i>
                        <h1>JGUA</h1>
                    </div>
                    <p class="subtitle">Sistema de Recolha de Dados</p>
                    
                    <form id="login-form" class="login-form">
                        <div class="form-group">
                            <label for="codigo-acesso">Código de Acesso</label>
                            <input type="password" id="codigo-acesso" name="codigo_acesso" required 
                                   placeholder="Digite seu código de acesso" maxlength="20">
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-full">
                            <span class="btn-text">Entrar</span>
                            <i class="fas fa-spinner fa-spin btn-loading" style="display: none;"></i>
                        </button>
                    </form>
                    
                    <div id="login-error" class="error-message" style="display: none;"></div>
                </div>
            </div>
        </section>

        <!-- Tela Principal (Dashboard) -->
        <section id="main-screen" class="screen">
            <!-- Header -->
            <header class="header">
                <div class="header-content">
                    <div class="logo-header">
                        <i class="fas fa-database"></i>
                        <span>JGUA</span>
                    </div>
                    
                    <nav class="nav-menu">
                        <button class="nav-item active" data-section="cadastro">
                            <i class="fas fa-edit"></i>
                            <span>Cadastro</span>
                        </button>
                        <button class="nav-item" data-section="monitor" id="nav-monitor" style="display: none;">
                            <i class="fas fa-search"></i>
                            <span>Monitor</span>
                        </button>
                        <button class="nav-item" data-section="dashboard" id="nav-dashboard" style="display: none;">
                            <i class="fas fa-chart-bar"></i>
                            <span>Dashboard</span>
                        </button>
                        <button class="nav-item" data-section="gestao" id="nav-gestao" style="display: none;">
                            <i class="fas fa-users"></i>
                            <span>Gestão</span>
                        </button>
                    </nav>
                    
                    <div class="header-actions">
                        <button id="sync-btn" class="btn btn-icon" title="Sincronizar">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button id="logout-btn" class="btn btn-icon" title="Sair">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Container de Conteúdo -->
            <main class="main-content">
                <!-- Seção Cadastro -->
                <section id="cadastro-section" class="content-section active">
                    <div class="section-header">
                        <h2>Formulário de Cadastro</h2>
                        <div class="sync-status">
                            <span id="sync-status" class="status-indicator">Offline</span>
                        </div>
                    </div>
                    
                    <div class="form-card">
                        <form id="cadastro-form" class="cadastro-form">
                            <div class="form-grid">
                                <!-- Dados Pessoais -->
                                <div class="form-group full-width">
                                    <label for="nome-completo">Nome Completo *</label>
                                    <input type="text" id="nome-completo" name="nome_completo" required>
                                </div>
                                
                                <div class="form-group">
                                    <label for="cpf">CPF *</label>
                                    <input type="text" id="cpf" name="cpf" required maxlength="14" 
                                           placeholder="000.000.000-00">
                                </div>
                                
                                <div class="form-group">
                                    <label for="sexo">Sexo *</label>
                                    <select id="sexo" name="sexo" required>
                                        <option value="">Selecione</option>
                                        <option value="Masculino">Masculino</option>
                                        <option value="Feminino">Feminino</option>
                                    </select>
                                </div>
                                
                                <div class="form-group">
                                    <label for="data-nascimento">Data de Nascimento</label>
                                    <input type="date" id="data-nascimento" name="data_nascimento">
                                </div>
                                
                                <div class="form-group">
                                    <label for="telefone">Telefone</label>
                                    <input type="tel" id="telefone" name="telefone" maxlength="15" 
                                           placeholder="(00) 00000-0000">
                                </div>
                                
                                <!-- Endereço com ViaCEP -->
                                <div class="form-group">
                                    <label for="cep">CEP</label>
                                    <input type="text" id="cep" name="cep" maxlength="9" 
                                           placeholder="00000-000">
                                </div>
                                
                                <div class="form-group">
                                    <label for="logradouro">Logradouro</label>
                                    <input type="text" id="logradouro" name="logradouro">
                                </div>
                                
                                <div class="form-group">
                                    <label for="numero">Número</label>
                                    <input type="text" id="numero" name="numero">
                                </div>
                                
                                <div class="form-group">
                                    <label for="complemento">Complemento</label>
                                    <input type="text" id="complemento" name="complemento">
                                </div>
                                
                                <div class="form-group">
                                    <label for="bairro">Bairro</label>
                                    <input type="text" id="bairro" name="bairro">
                                </div>
                                
                                <div class="form-group">
                                    <label for="cidade">Cidade</label>
                                    <input type="text" id="cidade" name="cidade">
                                </div>
                                
                                <div class="form-group">
                                    <label for="uf">UF</label>
                                    <input type="text" id="uf" name="uf" maxlength="2">
                                </div>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" id="limpar-form" class="btn btn-secondary">
                                    <i class="fas fa-eraser"></i>
                                    Limpar
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i>
                                    <span class="btn-text">Salvar</span>
                                    <i class="fas fa-spinner fa-spin btn-loading" style="display: none;"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- Seção Monitor -->
                <section id="monitor-section" class="content-section">
                    <div class="section-header">
                        <h2>Monitor de Cadastros</h2>
                        <div class="search-container">
                            <input type="text" id="search-input" placeholder="Buscar por CPF ou Nome...">
                            <button id="search-btn" class="btn btn-icon">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="results-container">
                        <div id="monitor-results" class="results-grid">
                            <!-- Cards de resultados serão inseridos aqui -->
                        </div>
                        <div id="no-results" class="no-results" style="display: none;">
                            <i class="fas fa-search"></i>
                            <p>Nenhum resultado encontrado</p>
                        </div>
                    </div>
                </section>

                <!-- Seção Dashboard -->
                <section id="dashboard-section" class="content-section">
                    <div class="section-header">
                        <h2>Dashboard</h2>
                    </div>
                    
                    <div class="dashboard-grid">
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Total de Cadastros</h3>
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="card-body">
                                <span id="total-cadastros" class="metric-value">0</span>
                            </div>
                        </div>
                        
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Cadastros Hoje</h3>
                                <i class="fas fa-calendar-day"></i>
                            </div>
                            <div class="card-body">
                                <span id="cadastros-hoje" class="metric-value">0</span>
                            </div>
                        </div>
                        
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h3>Distribuição por Sexo</h3>
                                <i class="fas fa-venus-mars"></i>
                            </div>
                            <div class="card-body">
                                <canvas id="sexo-chart" width="200" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Seção Gestão -->
                <section id="gestao-section" class="content-section">
                    <div class="section-header">
                        <h2>Gestão de Utilizadores</h2>
                        <button id="add-user-btn" class="btn btn-primary">
                            <i class="fas fa-plus"></i>
                            Adicionar Usuário
                        </button>
                    </div>
                    
                    <div class="users-container">
                        <div id="users-list" class="users-grid">
                            <!-- Lista de usuários será inserida aqui -->
                        </div>
                    </div>
                </section>
            </main>
        </section>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loading-text">Processando...</p>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/idb@7/build/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
    
    <!-- App Scripts -->
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/viacep.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha no registro do ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
